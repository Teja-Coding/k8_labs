apiVersion: v1
kind: Pod
metadata:
  name: emptydir-pod
  namespace: default
spec:
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - mountPath: /var/log/html
      name: nginx-logs

  - name: almalinux
    image: almalinux:9
    command: ["sleep", "100000"]
    volumeMounts:
    - mountPath: /mnt/nginx-log
      name: nginx-logs

  volumes:
  - name: nginx-logs
    emptyDir: 
      sizeLimit: 100Mi